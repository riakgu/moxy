<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moxy Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Moxy Dashboard</h1>
        <div id="health-badge"></div>
    </header>

    <section id="stats">
        <div class="stat-card">
            <span class="stat-value" id="total-slots">-</span>
            <span class="stat-label">Total Slots</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="healthy-slots">-</span>
            <span class="stat-label">Healthy</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="active-connections">-</span>
            <span class="stat-label">Active Connections</span>
        </div>
    </section>

    <section id="management">
        <div class="toolbar">
            <div class="toolbar-group">
                <label for="provision-interface">Interface</label>
                <input type="text" id="provision-interface" value="usb0" placeholder="usb0">
            </div>
            <div class="toolbar-group">
                <label for="provision-slots">Slots</label>
                <input type="number" id="provision-slots" value="5" min="1" max="500">
            </div>
            <button class="btn btn-primary" id="btn-provision" onclick="provisionSlots()">Provision</button>
            <button class="btn btn-danger" id="btn-teardown" onclick="teardownAll()">Teardown All</button>
        </div>
        <div id="provision-status" class="status-msg"></div>
    </section>

    <section id="slots-section">
        <h2>Slots</h2>
        <table id="slots-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>IPv6</th>
                    <th>Public IPv4</th>
                    <th>Status</th>
                    <th>Connections</th>
                    <th>Last Checked</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="slots-body"></tbody>
        </table>
    </section>

    <script src="js/app.js"></script>
</body>

</html>
