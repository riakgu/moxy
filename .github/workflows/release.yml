name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build dashboard
        working-directory: web/dashboard
        run: |
          npm install
          npm run build

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o moxy-linux-arm64 ./cmd/web/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o moxy-linux-amd64 ./cmd/web/

      - name: Generate checksums
        run: |
          sha256sum moxy-linux-arm64 moxy-linux-amd64 > checksums.txt
          cat checksums.txt

      - name: Prepare release body
        run: |
          echo "## Checksums" > release_body.md
          echo '```' >> release_body.md
          cat checksums.txt >> release_body.md
          echo '```' >> release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            moxy-linux-arm64
            moxy-linux-amd64
            checksums.txt
          body_path: release_body.md
          generate_release_notes: true
